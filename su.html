<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Sign Up</title>
  </head>
  <body>
    <main class="page-panel">
      <form class="form-card">
        <h1>Sign Up</h1>
        <div class="field">
          <label for="signup-email">Email</label>
          <input id="signup-email" type="email" placeholder="Votre email" required />
        </div>
        <div class="field">
          <label for="signup-password">Password</label>
          <input id="signup-password" type="password" placeholder="Votre mot de passe" required />
        </div>
        <div class="field">
          <label for="confirm-password">Confirm password</label>
          <input id="confirm-password" type="password" placeholder="Confirmer le mot de passe" required />
        </div>
        <div class="field buttons">
          <button type="submit">Sign Up</button>
          <button type="reset">Cancel</button>
        </div>
      </form>
    </main>
  </body>
</html>
