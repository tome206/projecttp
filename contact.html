<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Contact</title>
  </head>

  <body>
    <main class="page-panel">
      <h2>Contact</h2>
      <form class="form-card">
        <div class="field">
          <label for="name">Nom</label>
          <input id="name" type="text" placeholder="Votre nom" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Votre email" required />
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" rows="5" placeholder="Votre order..." required></textarea>
        </div>
        <div class="field buttons">
          <button type="submit">Envoyer</button>
          <button type="reset">Annuler</button>
        </div>
      </form>

      <div class="contact-details">
        <p>+216 20 123 654</p>
        <p>Traceres2026@gamil.com</p>
        <p>Rond-point</p>
      </div>
    </main>
  </body>
</html>
